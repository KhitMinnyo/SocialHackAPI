{% extends "web/base.html" %}
{% block title %}Feed - SocialHack{% endblock %}
{% block content %}
<div class="sh-container">

  <div class="sh-card">
    <div id="sh-error" class="sh-error sh-hidden"></div>
    <form id="sh-new-post-form">
      <div class="sh-form-group">
        <textarea class="sh-textarea" id="sh-post-content" placeholder="What's happening?" required></textarea>
      </div>
      <div class="sh-form-group" style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="sh-post-public" checked>
        <label for="sh-post-public" style="display:inline; font-weight:normal;">Public post</label>
      </div>
      <button class="sh-btn" type="submit">Post</button>
    </form>
  </div>

  <div class="sh-card">
    <h3 style="margin-top:0;">Feed</h3>
    <div id="sh-posts">
      <p class="sh-muted">Loading posts...</p>
    </div>
  </div>

</div>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/feed.js') }}"></script>
{% endblock %}
